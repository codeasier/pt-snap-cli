version: "1.0"
queries:
  active_blocks:
    description: Get active memory blocks (active=1)
    devices:
      - all
    parameters:
      device_id:
        type: int
        default: null
        required: false
        description: Device ID to query
      limit:
        type: int
        default: 100
        required: false
        description: Maximum rows to return
    query: |
      SELECT * FROM {{ device_block_table }}
      WHERE state = 1
      ORDER BY size DESC
      LIMIT {{ limit }}
    output_schema:
      - column: id
        type: int
      - column: address
        type: hex
      - column: size
        type: int
      - column: requestedSize
        type: int
      - column: state
        type: int
      - column: allocEventId
        type: int
      - column: freeEventId
        type: int
