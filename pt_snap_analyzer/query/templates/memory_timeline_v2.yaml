version: "1.0"
queries:
  memory_timeline_v2:
    description: Get memory allocation timeline for analysis
    devices:
      - all
      - "0"
      - "1"
    parameters:
      start_time:
        type: float
        default: 0
        required: false
        description: Start time in seconds
      end_time:
        type: float
        default: null
        required: false
        description: End time in seconds
      limit:
        type: int
        default: 1000
        required: false
        description: Maximum number of records
    query: |
      SELECT id, action, address, size, allocated, active, reserved
      FROM {{ device_trace_table }}
      WHERE id >= {{ start_time|int }}
        {% if end_time is not none %}
        AND id <= {{ end_time|int }}
        {% endif %}
      ORDER BY id ASC
      LIMIT {{ limit }}
    output_schema:
      - column: id
        type: int
      - column: action
        type: int
      - column: address
        type: hex
      - column: size
        type: int
      - column: allocated
        type: int
      - column: active
        type: int
      - column: reserved
        type: int