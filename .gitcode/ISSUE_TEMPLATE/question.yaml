name: ❓ Question
description: 提出一个问题
title: "[QUESTION] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提问！请填写以下表单。
  
  - type: textarea
    id: topic
    attributes:
      label: 问题主题
      description: 简要描述你的问题主题
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 详细描述你的问题
    validations:
      required: true
  
  - type: checkboxes
    id: tried
    attributes:
      label: 已尝试的解决方案
      options:
        - label: 已阅读 README
        - label: 已查看文档
        - label: 已搜索现有 Issues
    validations:
      required: false
  
  - type: input
    id: os
    attributes:
      label: 操作系统
      description: 如适用，请填写
    validations:
      required: false
  
  - type: input
    id: version
    attributes:
      label: pt-snap-cli 版本
      description: 如适用，请填写
    validations:
      required: false
  
  - type: textarea
    id: code
    attributes:
      label: 相关代码或命令
      description: 如果问题与具体使用相关，请提供
      render: shell
    validations:
      required: false
  
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何有助于回答问题的信息
    validations:
      required: false
