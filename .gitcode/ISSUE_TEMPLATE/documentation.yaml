name: 📚 Documentation
description: 报告文档问题或提出改进建议
title: "[DOCS] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        感谢帮助改进文档！请填写以下表单。
  
  - type: checkboxes
    id: issue_type
    attributes:
      label: 问题类型
      options:
        - label: 文档内容错误或不准确
        - label: 文档缺失（缺少某些功能的说明）
        - label: 文档结构/导航问题
        - label: 示例代码错误
        - label: 文档格式问题
        - label: 需要添加新的文档
        - label: 其他
    validations:
      required: true
  
  - type: input
    id: location
    attributes:
      label: 受影响的位置
      description: 请指明问题所在的文档页面或章节
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 详细描述文档的问题是什么
    validations:
      required: true
  
  - type: textarea
    id: suggestion
    attributes:
      label: 改进建议
      description: 你建议如何改进这部分文档
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: 期望的内容
      description: 如果建议添加新内容，请描述应该包含什么
    validations:
      required: false
  
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 参考文档、截图等
    validations:
      required: false
