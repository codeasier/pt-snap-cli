name: 🐛 Bug Report
description: 报告一个程序错误
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢报告问题！请填写以下表单。
  
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述 bug 是什么
    validations:
      required: true
  
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 复现该行为的步骤
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 描述你期望发生什么
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生了什么
    validations:
      required: true
  
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Ubuntu
        - macOS
        - Windows
        - Other
    validations:
      required: true
  
  - type: input
    id: python_version
    attributes:
      label: Python 版本
      description: 如：3.10.12
    validations:
      required: true
  
  - type: input
    id: version
    attributes:
      label: pt-snap-cli 版本
      description: 如：0.1.0
    validations:
      required: true
  
  - type: textarea
    id: logs
    attributes:
      label: 日志/错误信息
      description: 请粘贴相关日志或错误输出
      render: shell
    validations:
      required: false
  
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何额外的上下文、截图等
    validations:
      required: false
