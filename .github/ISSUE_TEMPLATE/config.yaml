# GitHub Issue Templates Configuration
# 参考文档：https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository

blank_issues_enabled: true

contact_links:
  - name: 📖 项目文档
    url: https://github.com/codeasier/pt-snap-cli/tree/main/docs
    about: 查看项目文档和使用指南
  - name: 💬 讨论区
    url: https://github.com/codeasier/pt-snap-cli/discussions
    about: 在讨论区提问或分享想法
  - name: 📧 联系我们
    url: mailto:825770651@qq.com
    about: 通过邮件联系我们

# 模板排序（按此顺序显示在 Issue 选择页面）
issue_templates:
  - bug_report.yaml
  - feature_request.yaml
  - documentation.yaml
  - question.yaml

# ============================================================
# 标签与模板映射
# ============================================================
# 每个模板文件的 `labels` 字段定义了创建 Issue 时自动分配的标签
#
# | 模板文件           | 自动标签          | 说明           |
# |--------------------|-------------------|----------------|
# | bug_report.yaml    | bug               | 错误报告       |
# | feature_request.yaml | enhancement     | 功能请求       |
# | documentation.yaml | documentation     | 文档问题       |
# | question.yaml      | question          | 问题咨询       |
#
# 如需添加更多标签，编辑对应模板文件的 `labels:` 字段
# 示例：labels: ["bug", "critical", "help-wanted"]
# ============================================================
